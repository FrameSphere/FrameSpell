<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmeldung… – FrameSpell</title>
    <style>
        :root { --bg: #0f0f1e; --accent: #8b5cf6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #e4e4e7;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            text-align: center;
            padding: 48px 40px;
            background: #1a1a2e;
            border: 1px solid #2d2d44;
            border-radius: 20px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(139,92,246,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
        p  { font-size: 0.9rem; color: #a1a1aa; }
        .error-icon { font-size: 2.5rem; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Anmeldung wird verarbeitet…</h2>
    <p id="subtitle">Bitte warten – du wirst gleich weitergeleitet.</p>
</div>

<script>
(function () {
    var params   = new URLSearchParams(window.location.search);
    var token    = params.get('oauth_token');
    var userData = params.get('user_data');
    var error    = params.get('error');

    function showError(msg) {
        document.getElementById('spinner').style.display = 'none';
        var icon = document.createElement('div');
        icon.className = 'error-icon';
        icon.textContent = '⚠️';
        document.getElementById('card').prepend(icon);
        document.getElementById('title').textContent = 'Anmeldung fehlgeschlagen';
        document.getElementById('subtitle').textContent = msg || 'Bitte versuche es erneut.';
        setTimeout(function () { window.location.href = '/'; }, 3500);
    }

    if (error) {
        showError('OAuth-Fehler: ' + decodeURIComponent(error));
        return;
    }

    if (!token || !userData) {
        showError('Ungültige Antwort vom Server.');
        return;
    }

    try {
        var user = JSON.parse(decodeURIComponent(userData));
        // Token & User speichern
        localStorage.setItem('authToken', token);
        localStorage.setItem('currentUser', JSON.stringify(user));
        // Zur Hauptseite mit OAuth-Params (oauth.js liest diese aus)
        window.location.href = '/?oauth_token=' + encodeURIComponent(token) +
                               '&user_data=' + encodeURIComponent(JSON.stringify(user));
    } catch (e) {
        showError('Fehler beim Verarbeiten der Anmeldedaten.');
    }
})();
</script>
</body>
</html>
